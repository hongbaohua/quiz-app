<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tickit</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tickit" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-icon"></div>
      <span class="sidebar-title">Tickit</span>
    </div>
    <nav>
      <a href="index.html" class="nav-link active"><span class="nav-dot"></span>首頁</a>
      <a href="dashboard.html" class="nav-link"><span class="nav-dot"></span>考生管理</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Login view -->
    <div id="view-login">
      <div>
        <div style="text-align:center;margin-bottom:1.8rem;">
          <div style="display:flex;justify-content:center;margin-bottom:0.9rem;">
            <div style="width:44px;height:44px;background:linear-gradient(135deg,#4F46E5,#6366F1);
                        border-radius:10px;display:flex;align-items:center;justify-content:center;
                        box-shadow:0 4px 14px rgba(79,70,229,0.4);">
              <span style="color:white;font-size:1.4rem;font-weight:900;line-height:1;">✓</span>
            </div>
          </div>
          <div style="font-size:1.4rem;font-weight:800;color:#111827;letter-spacing:0.5px;margin-bottom:0.3rem;">
            Tickit
          </div>
          <div style="font-size:0.82rem;color:#9CA3AF;font-weight:500;">通往及格的通行證</div>
        </div>

        <div class="card card-top-accent">
          <div class="field-label">用戶代號</div>
          <input type="text" id="input-name" placeholder="輸入你的專屬代號" autocomplete="off" />
          <p class="field-hint">輸入代號即可識別身份，無需密碼</p>

          <!-- 一般登入按鈕 -->
          <div id="login-action" style="margin-top:1.2rem;">
            <button class="btn btn-primary btn-full" id="btn-login">進入系統 →</button>
          </div>

          <!-- 新用戶確認區塊（找不到代號時顯示） -->
          <div id="confirm-create" style="display:none;margin-top:1.2rem;">
            <div style="font-size:0.84rem;color:#374151;margin-bottom:0.85rem;line-height:1.6;">
              找不到代號 <strong id="confirm-name"></strong>，要建立新帳號嗎？
            </div>
            <div style="display:flex;gap:0.5rem;">
              <button class="btn btn-primary" style="flex:1;" id="btn-confirm-create">建立帳號</button>
              <button class="btn btn-ghost" style="flex:1;" id="btn-reenter">重新輸入</button>
            </div>
          </div>
        </div>

        <div id="login-error" style="color:#EF4444;font-size:0.8rem;text-align:center;margin-top:0.75rem;display:none;"></div>
      </div>
    </div>

    <!-- Quiz setup view -->
    <div id="view-setup" style="display:none;">

      <div class="user-bar">
        <div class="user-info">
          <div class="user-avatar" id="avatar-letter">U</div>
          <div>
            <div class="user-name" id="display-name">—</div>
            <div class="user-label">用戶代號</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-logout"
                style="color:#6B7280;font-size:0.75rem;">登出</button>
      </div>

      <!-- Step 01: Topic -->
      <div class="card">
        <div class="step-header">
          <span class="step-badge">01</span>主題
        </div>
        <select id="select-topic">
          <option value="">— 請選擇主題 —</option>
        </select>
      </div>

      <!-- Step 02: Units -->
      <div class="card" id="card-units" style="display:none;">
        <div class="step-header">
          <span class="step-badge">02</span>單元
        </div>
        <div class="select-all-row">
          <button class="btn btn-ghost btn-sm" id="btn-view-toggle" style="display:none;" onclick="toggleUnitView()">⊞ 縮圖</button>
          <button class="btn btn-ghost btn-sm" id="btn-select-all">全選</button>
        </div>
        <div class="checkbox-group" id="units-list"></div>
        <div class="unit-count" id="unit-count"></div>
      </div>

      <!-- Step 03: Count / Mode -->
      <div class="card" id="card-count" style="display:none;">
        <div class="step-header">
          <span class="step-badge">03</span>練習模式
        </div>
        <div style="display:flex;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.875rem;">
            <input type="radio" name="mode" value="all" checked style="accent-color:#4F46E5;" /> 全部題目
          </label>
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.875rem;">
            <input type="radio" name="mode" value="random" style="accent-color:#4F46E5;" /> 隨機抽取 N 題
          </label>
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.875rem;">
            <input type="radio" name="mode" value="wrong-only" style="accent-color:#EF4444;" /> 只練習錯題
          </label>
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.875rem;">
            <input type="radio" name="mode" value="mastery" style="accent-color:#DC2626;" /> 攻克模式
          </label>
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-size:0.875rem;">
            <input type="radio" name="mode" value="marked" style="accent-color:#F59E0B;" /> ★ 反覆練習標記題目
          </label>
        </div>
        <div id="random-input" style="display:none;">
          <input type="number" id="input-n" min="1" max="200" value="10" style="width:100px;" />
        </div>
        <div id="mode-hint" style="display:none;" class="field-hint"></div>
      </div>

      <button class="btn btn-primary btn-full" id="btn-start" disabled>開始測驗 →</button>
      <p id="start-hint" style="text-align:center;font-size:0.76rem;color:#9CA3AF;margin-top:0.5rem;">
        請先選擇至少一個單元
      </p>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/parser.js"></script>
<script>
  const state = {
    userId: null,
    userName: null,
    manifest: null,
    selectedUnits: new Set(),
  };
  let unitQuestionCounts = {};
  let unitViewMode = "list"; // "list" | "grid"

  // ── Restore session ──
  const saved = sessionStorage.getItem("quizUser");
  if (saved) {
    const { id, name } = JSON.parse(saved);
    state.userId = id;
    state.userName = name;
    showSetup();
  }

  // ── 標記題目（localStorage）──
  function loadBookmarks(userId) {
    try { return new Set(JSON.parse(localStorage.getItem(`bookmarks_${userId}`) || "[]")); }
    catch(e) { return new Set(); }
  }

  // ── Toast ──
  function showToast(msg, duration = 2500) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), duration);
  }

  // ── Login ──
  document.getElementById("btn-login").addEventListener("click", doLogin);
  document.getElementById("input-name").addEventListener("keydown", (e) => {
    if (e.key === "Enter") doLogin();
  });

  async function doLogin() {
    const name = document.getElementById("input-name").value.trim();
    const errEl = document.getElementById("login-error");
    errEl.style.display = "none";
    if (!name) { errEl.textContent = "請輸入用戶代號。"; errEl.style.display = "block"; return; }

    const btn = document.getElementById("btn-login");
    btn.disabled = true;
    btn.textContent = "連線中…";

    try {
      const existing = await getUserByName(name);
      if (existing) {
        // 已有帳號 → 直接登入
        await completeLogin(existing.id, name);
      } else {
        // 查無此代號 → 顯示確認建立區塊
        document.getElementById("input-name").disabled = true;
        document.getElementById("login-action").style.display = "none";
        document.getElementById("confirm-create").style.display = "block";
        document.getElementById("confirm-name").textContent = `「${name}」`;
      }
    } catch (e) {
      errEl.textContent = "無法連線至資料庫，請稍後再試。";
      errEl.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "進入系統 →";
    }
  }

  // 確認建立新帳號
  document.getElementById("btn-confirm-create").addEventListener("click", async () => {
    const name = document.getElementById("input-name").value.trim();
    const btn = document.getElementById("btn-confirm-create");
    btn.disabled = true; btn.textContent = "建立中…";
    try {
      const id = await getOrCreateUser(name);
      await completeLogin(id, name);
    } catch (e) {
      document.getElementById("login-error").textContent = "無法連線至資料庫，請稍後再試。";
      document.getElementById("login-error").style.display = "block";
      resetLoginForm();
    }
  });

  // 重新輸入
  document.getElementById("btn-reenter").addEventListener("click", resetLoginForm);

  function resetLoginForm() {
    document.getElementById("input-name").disabled = false;
    document.getElementById("input-name").value = "";
    document.getElementById("login-action").style.display = "block";
    document.getElementById("confirm-create").style.display = "none";
    document.getElementById("login-error").style.display = "none";
    document.getElementById("input-name").focus();
  }

  async function completeLogin(id, name) {
    state.userId = id;
    state.userName = name;
    sessionStorage.setItem("quizUser", JSON.stringify({ id, name }));
    showSetup();
  }

  // ── Logout ──
  document.getElementById("btn-logout").addEventListener("click", () => {
    sessionStorage.removeItem("quizUser");
    state.userId = null;
    state.userName = null;
    state.selectedUnits.clear();
    // 重置選擇狀態
    document.getElementById("select-topic").value = "";
    document.getElementById("card-units").style.display = "none";
    document.getElementById("card-count").style.display = "none";
    document.getElementById("btn-start").disabled = true;
    document.getElementById("start-hint").style.display = "block";
    // 切回登入頁
    document.getElementById("view-setup").style.display = "none";
    document.getElementById("view-login").style.display = "block";
    resetLoginForm();
  });

  // ── Setup view ──
  async function showSetup() {
    document.getElementById("view-login").style.display = "none";
    document.getElementById("view-setup").style.display = "block";
    document.getElementById("display-name").textContent = state.userName;
    document.getElementById("avatar-letter").textContent = state.userName[0].toUpperCase();

    if (!state.manifest) {
      const res = await fetch("questions/manifest.json");
      state.manifest = await res.json();
    }

    const sel = document.getElementById("select-topic");
    sel.innerHTML = '<option value="">— 請選擇主題 —</option>';
    state.manifest.topics.forEach((t) => {
      const opt = document.createElement("option");
      opt.value = t.name;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
  }

  // ── Topic change ──
  document.getElementById("select-topic").addEventListener("change", function () {
    const topicName = this.value;
    const cardUnits = document.getElementById("card-units");
    const cardCount = document.getElementById("card-count");
    state.selectedUnits.clear();
    updateStartBtn();

    if (!topicName) {
      cardUnits.style.display = "none";
      cardCount.style.display = "none";
      return;
    }

    const topic = state.manifest.topics.find((t) => t.name === topicName);
    const list = document.getElementById("units-list");
    list.innerHTML = "";
    unitQuestionCounts = {};
    topic.units.forEach((u, idx) => {
      // 提取檔名中除去「Day X：」或「樣題 X：」與「.md」的部分作為標題
      const title = u.file.replace(/^[\u200b\s]*(Day|樣題)\s*\d+\s*[：:]\s*/i, "").replace(/\.md$/i, "");

      const label = document.createElement("label");
      label.className = "checkbox-item";
      label.innerHTML = `
        <input type="checkbox" value="${u.unit}" />
        <div class="unit-info-wrapper">
          <span class="unit-tag">${u.unit}</span>
          <span class="unit-title">${title}</span>
          <span class="unit-count-badge" id="uqc-${idx}" style="margin-left:auto;font-size:0.72rem;color:#9CA3AF;
                white-space:nowrap;padding-left:0.5rem;">…</span>
        </div>
      `;
      label.querySelector("input").addEventListener("change", onUnitChange);
      list.appendChild(label);
    });

    cardUnits.style.display = "block";
    cardCount.style.display = "block";
    updateUnitCount();

    // 5 個以上單元時顯示縮圖切換按鈕，並重置為清單模式
    unitViewMode = "list";
    const toggleBtn = document.getElementById("btn-view-toggle");
    const unitsList = document.getElementById("units-list");
    unitsList.classList.remove("grid-mode");
    if (topic.units.length >= 5) {
      toggleBtn.style.display = "inline-flex";
      toggleBtn.textContent = "⊞ 縮圖";
    } else {
      toggleBtn.style.display = "none";
    }

    // 非同步載入各單元題目數
    topic.units.forEach(async (u, idx) => {
      try {
        const path = `questions/${encodeURIComponent(topicName)}/${encodeURIComponent(u.file)}`;
        const res = await fetch(path);
        if (!res.ok) return;
        const text = await res.text();
        const qs = parseMarkdown(text, topicName, u.file);
        unitQuestionCounts[u.unit] = qs.length;
        const countEl = document.getElementById(`uqc-${idx}`);
        if (countEl) countEl.textContent = `${qs.length} 題`;
        updateUnitCount();
      } catch (e) {
        const countEl = document.getElementById(`uqc-${idx}`);
        if (countEl) countEl.textContent = "";
      }
    });
  });

  function onUnitChange(e) {
    const label = e.target.closest(".checkbox-item");
    if (e.target.checked) {
      state.selectedUnits.add(e.target.value);
      label.classList.add("checked");
    } else {
      state.selectedUnits.delete(e.target.value);
      label.classList.remove("checked");
    }
    updateUnitCount();
    updateStartBtn();
  }

  document.getElementById("btn-select-all").addEventListener("click", () => {
    const checkboxes = document.querySelectorAll("#units-list input[type=checkbox]");
    const allChecked = [...checkboxes].every((c) => c.checked);
    checkboxes.forEach((c) => {
      c.checked = !allChecked;
      const label = c.closest(".checkbox-item");
      if (!allChecked) { state.selectedUnits.add(c.value); label.classList.add("checked"); }
      else { state.selectedUnits.delete(c.value); label.classList.remove("checked"); }
    });
    updateUnitCount();
    updateStartBtn();
  });

  function updateUnitCount() {
    const total = document.querySelectorAll("#units-list input[type=checkbox]").length;
    const el = document.getElementById("unit-count");
    if (state.selectedUnits.size > 0) {
      const totalQs = [...state.selectedUnits].reduce((sum, u) => sum + (unitQuestionCounts[u] || 0), 0);
      const allLoaded = [...state.selectedUnits].every(u => unitQuestionCounts[u] !== undefined);
      const qsText = allLoaded && totalQs > 0 ? `，共 ${totalQs} 題` : "";
      el.textContent = `已選 ${state.selectedUnits.size} / ${total} 個單元${qsText}`;
    } else {
      el.textContent = "";
    }
  }

  function updateStartBtn() {
    const btn = document.getElementById("btn-start");
    const hint = document.getElementById("start-hint");
    btn.disabled = state.selectedUnits.size === 0;
    hint.style.display = state.selectedUnits.size === 0 ? "block" : "none";
  }

  // ── Unit view toggle ──
  function toggleUnitView() {
    const unitsList = document.getElementById("units-list");
    const toggleBtn = document.getElementById("btn-view-toggle");
    if (unitViewMode === "list") {
      unitViewMode = "grid";
      unitsList.classList.add("grid-mode");
      toggleBtn.textContent = "☰ 清單";
    } else {
      unitViewMode = "list";
      unitsList.classList.remove("grid-mode");
      toggleBtn.textContent = "⊞ 縮圖";
    }
  }

  // ── Mode toggle ──
  const modeHints = {
    "wrong-only": "從本帳號歷史紀錄篩選曾答錯過的題目，一次性完整測驗。",
    "mastery": "循環練習錯題，答錯自動排回佇列，直到每一題都攻克為止。",
    "marked": "反覆練習你手動標記（★）的題目，直到每題都攻克為止。可在任何模式的答題過程中標記題目。",
  };
  document.querySelectorAll("input[name=mode]").forEach((r) => {
    r.addEventListener("change", () => {
      document.getElementById("random-input").style.display =
        r.value === "random" && r.checked ? "block" : "none";
      const hintEl = document.getElementById("mode-hint");
      if ((r.value === "wrong-only" || r.value === "mastery" || r.value === "marked") && r.checked) {
        hintEl.textContent = modeHints[r.value];
        hintEl.style.display = "block";
      } else {
        hintEl.style.display = "none";
      }
    });
  });

  // ── Start quiz ──
  document.getElementById("btn-start").addEventListener("click", async () => {
    const topic = document.getElementById("select-topic").value;
    const units = [...state.selectedUnits];
    const mode = document.querySelector("input[name=mode]:checked").value;
    const n = parseInt(document.getElementById("input-n").value, 10) || 10;

    const btn = document.getElementById("btn-start");
    btn.disabled = true;
    btn.textContent = "載入題目…";

    try {
      let questions = await loadQuestions(topic, units);
      if (!questions.length) { showToast("選取的單元中找不到題目"); btn.disabled = false; btn.textContent = "開始測驗 →"; return; }

      if (mode === "wrong-only" || mode === "mastery") {
        const wrongIds = await getWrongQuestionIds(state.userId, topic, units);
        if (!wrongIds.size) {
          showToast("這些單元目前沒有答錯紀錄，換個模式試試");
          btn.disabled = false; btn.textContent = "開始測驗 →"; return;
        }
        questions = questions.filter((q) => wrongIds.has(q.id));
        if (!questions.length) {
          showToast("找不到對應的錯題（題庫可能已更新），換個模式試試");
          btn.disabled = false; btn.textContent = "開始測驗 →"; return;
        }
        questions = sampleQuestions(questions, questions.length);
      } else if (mode === "marked") {
        const bookmarks = loadBookmarks(state.userId);
        questions = questions.filter((q) => bookmarks.has(q.id));
        if (!questions.length) {
          showToast("這些單元中沒有標記的題目，請先在答題過程中點擊 ☆ 標記");
          btn.disabled = false; btn.textContent = "開始測驗 →"; return;
        }
        questions = sampleQuestions(questions, questions.length);
      } else if (mode === "random") {
        questions = sampleQuestions(questions, n);
      } else {
        // 全部模式也打亂題目順序
        questions = sampleQuestions(questions, questions.length);
      }
      // 每題選項打亂並移除末尾句號
      questions = shuffleOptions(questions);

      const sessionId = Date.now().toString(36);
      sessionStorage.setItem("quizSession", JSON.stringify({
        questions,
        topic,
        units,
        userId: state.userId,
        userName: state.userName,
        sessionId,
        mode,
      }));
      window.location.href = "quiz.html";
    } catch (e) {
      showToast("載入題目失敗，請稍後再試");
      btn.disabled = false;
      btn.textContent = "開始測驗 →";
    }
  });
</script>
<script src="js/pwa.js"></script>
</body>
</html>
